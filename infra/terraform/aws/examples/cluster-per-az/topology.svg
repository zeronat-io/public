<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ZeroNAT cluster per availability zone architecture diagram">
<style>
  :root {
    --bg-subnet: #f6f8fa;
    --bg-cluster: #ddf4ff;
    --bg-node: #ddf4ff;
    --bg-rt: #fbefff;
    --bg-eip: #fff8c5;
    --bg-test: #f6f8fa;
    --stroke-vpc: #656d76;
    --stroke-az: #d0d7de;
    --stroke-cluster: #0969da;
    --stroke-node: #0969da;
    --stroke-rt: #8250df;
    --stroke-eip: #9a6700;
    --stroke-test: #8b949e;
    --stroke-arr: #656d76;
    --text-primary: #1f2328;
    --text-secondary: #656d76;
    --text-node: #0550ae;
    --text-rt: #6639ba;
    --text-eip: #7d4e00;
    --text-note: #656d76;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-subnet: #161b22;
      --bg-cluster: #0c2d49;
      --bg-node: #0c2d49;
      --bg-rt: #1c0f35;
      --bg-eip: #2a1f00;
      --bg-test: #161b22;
      --stroke-vpc: #8b949e;
      --stroke-az: #30363d;
      --stroke-cluster: #58a6ff;
      --stroke-node: #58a6ff;
      --stroke-rt: #bc8cff;
      --stroke-eip: #d29922;
      --stroke-test: #484f58;
      --stroke-arr: #8b949e;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-node: #79c0ff;
      --text-rt: #d2a8ff;
      --text-eip: #e3b341;
      --text-note: #8b949e;
    }
  }
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; }
  .t14b { font-size: 14px; font-weight: 600; }
  .t13b { font-size: 13px; font-weight: 600; }
  .t12  { font-size: 12px; font-weight: 400; }
  .t11  { font-size: 11px; font-weight: 400; }
  .t10  { font-size: 10px; font-weight: 400; }
</style>
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="var(--stroke-arr)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Internet + IGW -->
<text class="t12" x="340" y="14" text-anchor="middle" fill="var(--text-secondary)">Internet</text>
<g>
  <title>Internet gateway — routes public subnet traffic to/from the internet</title>
  <rect x="278" y="24" width="124" height="34" rx="6" fill="var(--bg-test)" stroke="var(--stroke-test)" stroke-width="0.75"/>
  <text class="t12" x="340" y="45" text-anchor="middle" fill="var(--text-primary)" dominant-baseline="central">Internet gateway</text>
</g>
<line x1="340" y1="58" x2="340" y2="74" stroke="var(--stroke-arr)" stroke-width="1" marker-end="url(#ah)"/>

<!-- VPC -->
<rect x="15" y="76" width="650" height="462" rx="12" fill="none" stroke="var(--stroke-vpc)" stroke-width="1.25" stroke-dasharray="6 3"/>
<text class="t14b" x="340" y="95" text-anchor="middle" fill="var(--text-primary)">VPC 10.0.0.0/16</text>

<!-- AZ-a boundary -->
<rect x="24" y="106" width="316" height="424" rx="8" fill="none" stroke="var(--stroke-az)" stroke-width="0.75" stroke-dasharray="4 3"/>
<text class="t11" x="182" y="120" text-anchor="middle" fill="var(--text-secondary)">AZ-a</text>

<!-- AZ-b boundary -->
<rect x="350" y="106" width="308" height="424" rx="8" fill="none" stroke="var(--stroke-az)" stroke-width="0.75" stroke-dasharray="4 3"/>
<text class="t11" x="504" y="120" text-anchor="middle" fill="var(--text-secondary)">AZ-b</text>

<!-- Public subnet A -->
<rect x="36" y="128" width="292" height="152" rx="8" fill="var(--bg-subnet)" stroke="var(--stroke-az)" stroke-width="0.75"/>
<text class="t11" x="182" y="143" text-anchor="middle" fill="var(--text-secondary)">Public 10.0.1.0/24</text>

<!-- Cluster A -->
<g>
  <title>ZeroNAT cluster "cluster-az-a" — HA pair within AZ-a. Both nodes in the same public subnet. Controls only RT-a. TCP 7946 heartbeat + conntrack sync.</title>
  <rect x="48" y="150" width="268" height="118" rx="8" fill="var(--bg-cluster)" stroke="var(--stroke-cluster)" stroke-width="0.75" stroke-dasharray="5 3"/>
  <text class="t11" x="182" y="165" text-anchor="middle" fill="var(--text-node)">cluster "cluster-az-a"</text>
</g>

<g>
  <title>NAT-a1 — active node for cluster-az-a. Boots with TAKEOVER_ON_BOOT=true, creates 0.0.0.0/0 route on RT-a.</title>
  <rect x="60" y="174" width="118" height="42" rx="6" fill="var(--bg-node)" stroke="var(--stroke-node)" stroke-width="1"/>
  <text class="t13b" x="119" y="189" text-anchor="middle" fill="var(--text-node)" dominant-baseline="central">NAT-a1</text>
  <text class="t10" x="119" y="205" text-anchor="middle" fill="var(--text-node)" dominant-baseline="central">active</text>
</g>

<g>
  <title>NAT-a2 — standby node for cluster-az-a. Takes over RT-a route + EIP if NAT-a1 fails.</title>
  <rect x="186" y="174" width="118" height="42" rx="6" fill="var(--bg-node)" stroke="var(--stroke-node)" stroke-width="1"/>
  <text class="t13b" x="245" y="189" text-anchor="middle" fill="var(--text-node)" dominant-baseline="central">NAT-a2</text>
  <text class="t10" x="245" y="205" text-anchor="middle" fill="var(--text-node)" dominant-baseline="central">standby</text>
</g>

<!-- Heartbeat A -->
<line x1="178" y1="192" x2="186" y2="192" stroke="var(--stroke-cluster)" stroke-width="0.75" stroke-dasharray="2 2"/>

<!-- EIP A -->
<g>
  <title>Elastic IP for cluster-az-a — consistent egress address. Migrated to surviving node on failover.</title>
  <rect x="114" y="224" width="72" height="18" rx="9" fill="var(--bg-eip)" stroke="var(--stroke-eip)" stroke-width="0.75"/>
  <text class="t10" x="150" y="233" text-anchor="middle" fill="var(--text-eip)" dominant-baseline="central">EIP-a</text>
</g>
<line x1="136" y1="224" x2="119" y2="216" stroke="var(--stroke-eip)" stroke-width="0.5" stroke-dasharray="2 2"/>

<!-- Heartbeat label A -->
<text class="t10" x="182" y="255" text-anchor="middle" fill="var(--text-node)">TCP 7946 heartbeat</text>

<!-- Public subnet B -->
<rect x="362" y="128" width="284" height="152" rx="8" fill="var(--bg-subnet)" stroke="var(--stroke-az)" stroke-width="0.75"/>
<text class="t11" x="504" y="143" text-anchor="middle" fill="var(--text-secondary)">Public 10.0.2.0/24</text>

<!-- Cluster B -->
<g>
  <title>ZeroNAT cluster "cluster-az-b" — HA pair within AZ-b. Both nodes in the same public subnet. Controls only RT-b. TCP 7946 heartbeat + conntrack sync.</title>
  <rect x="374" y="150" width="260" height="118" rx="8" fill="var(--bg-cluster)" stroke="var(--stroke-cluster)" stroke-width="0.75" stroke-dasharray="5 3"/>
  <text class="t11" x="504" y="165" text-anchor="middle" fill="var(--text-node)">cluster "cluster-az-b"</text>
</g>

<g>
  <title>NAT-b1 — active node for cluster-az-b. Boots with TAKEOVER_ON_BOOT=true, creates 0.0.0.0/0 route on RT-b.</title>
  <rect x="386" y="174" width="110" height="42" rx="6" fill="var(--bg-node)" stroke="var(--stroke-node)" stroke-width="1"/>
  <text class="t13b" x="441" y="189" text-anchor="middle" fill="var(--text-node)" dominant-baseline="central">NAT-b1</text>
  <text class="t10" x="441" y="205" text-anchor="middle" fill="var(--text-node)" dominant-baseline="central">active</text>
</g>

<g>
  <title>NAT-b2 — standby node for cluster-az-b. Takes over RT-b route + EIP if NAT-b1 fails.</title>
  <rect x="504" y="174" width="118" height="42" rx="6" fill="var(--bg-node)" stroke="var(--stroke-node)" stroke-width="1"/>
  <text class="t13b" x="563" y="189" text-anchor="middle" fill="var(--text-node)" dominant-baseline="central">NAT-b2</text>
  <text class="t10" x="563" y="205" text-anchor="middle" fill="var(--text-node)" dominant-baseline="central">standby</text>
</g>

<!-- Heartbeat B -->
<line x1="496" y1="192" x2="504" y2="192" stroke="var(--stroke-cluster)" stroke-width="0.75" stroke-dasharray="2 2"/>

<!-- EIP B -->
<g>
  <title>Elastic IP for cluster-az-b — consistent egress address. Migrated to surviving node on failover.</title>
  <rect x="434" y="224" width="72" height="18" rx="9" fill="var(--bg-eip)" stroke="var(--stroke-eip)" stroke-width="0.75"/>
  <text class="t10" x="470" y="233" text-anchor="middle" fill="var(--text-eip)" dominant-baseline="central">EIP-b</text>
</g>
<line x1="456" y1="224" x2="441" y2="216" stroke="var(--stroke-eip)" stroke-width="0.5" stroke-dasharray="2 2"/>

<!-- Heartbeat label B -->
<text class="t10" x="504" y="255" text-anchor="middle" fill="var(--text-node)">TCP 7946 heartbeat</text>

<!-- Route arrows — each AZ has its own, no cross-AZ -->
<line x1="182" y1="310" x2="182" y2="280" stroke="var(--stroke-arr)" stroke-width="1" marker-end="url(#ah)"/>
<text class="t10" x="182" y="300" text-anchor="middle" fill="var(--text-secondary)">0.0.0.0/0</text>

<line x1="504" y1="310" x2="504" y2="280" stroke="var(--stroke-arr)" stroke-width="1" marker-end="url(#ah)"/>
<text class="t10" x="504" y="300" text-anchor="middle" fill="var(--text-secondary)">0.0.0.0/0</text>

<!-- Private subnet A -->
<rect x="36" y="316" width="292" height="140" rx="8" fill="var(--bg-subnet)" stroke="var(--stroke-az)" stroke-width="0.75"/>
<text class="t11" x="182" y="332" text-anchor="middle" fill="var(--text-secondary)">Private 10.0.10.0/24</text>

<!-- RT-a -->
<g>
  <title>RT-a — private route table for AZ-a. Managed exclusively by cluster-az-a. Tagged with zeronat:group = cluster-az-a.</title>
  <rect x="60" y="344" width="244" height="24" rx="6" fill="var(--bg-rt)" stroke="var(--stroke-rt)" stroke-width="0.75"/>
  <text class="t11" x="182" y="356" text-anchor="middle" fill="var(--text-rt)" dominant-baseline="central">RT-a · zeronat:group = cluster-az-a</text>
</g>

<!-- Test A -->
<g>
  <title>Test instance in AZ-a — t4g.nano in private subnet, uses cluster-az-a for outbound internet access</title>
  <rect x="108" y="384" width="148" height="40" rx="6" fill="var(--bg-test)" stroke="var(--stroke-test)" stroke-width="0.75"/>
  <text class="t12" x="182" y="404" text-anchor="middle" fill="var(--text-primary)" dominant-baseline="central">Test instance</text>
</g>

<!-- Private subnet B -->
<rect x="362" y="316" width="284" height="140" rx="8" fill="var(--bg-subnet)" stroke="var(--stroke-az)" stroke-width="0.75"/>
<text class="t11" x="504" y="332" text-anchor="middle" fill="var(--text-secondary)">Private 10.0.20.0/24</text>

<!-- RT-b -->
<g>
  <title>RT-b — private route table for AZ-b. Managed exclusively by cluster-az-b. Tagged with zeronat:group = cluster-az-b.</title>
  <rect x="378" y="344" width="252" height="24" rx="6" fill="var(--bg-rt)" stroke="var(--stroke-rt)" stroke-width="0.75"/>
  <text class="t11" x="504" y="356" text-anchor="middle" fill="var(--text-rt)" dominant-baseline="central">RT-b · zeronat:group = cluster-az-b</text>
</g>

<!-- Test B -->
<g>
  <title>Test instance in AZ-b — t4g.nano in private subnet, uses cluster-az-b for outbound internet access</title>
  <rect x="430" y="384" width="148" height="40" rx="6" fill="var(--bg-test)" stroke="var(--stroke-test)" stroke-width="0.75"/>
  <text class="t12" x="504" y="404" text-anchor="middle" fill="var(--text-primary)" dominant-baseline="central">Test instance</text>
</g>

<!-- IGW connections -->
<line x1="182" y1="128" x2="310" y2="76" stroke="var(--stroke-az)" stroke-width="0.5" opacity="0.4"/>
<line x1="504" y1="128" x2="370" y2="76" stroke="var(--stroke-az)" stroke-width="0.5" opacity="0.4"/>

<!-- Notes -->
<text class="t11" x="340" y="496" text-anchor="middle" fill="var(--text-note)">Two independent clusters — no cross-AZ NAT traffic</text>
<text class="t11" x="340" y="512" text-anchor="middle" fill="var(--text-note)">Each cluster controls only its own AZ's route table</text>
<text class="t11" x="340" y="528" text-anchor="middle" fill="var(--text-note)">AZ failure isolates only that AZ's NAT — most resilient topology</text>

</svg>