<svg width="680" height="480" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ZeroNAT single per availability zone architecture diagram">
<style>
  :root {
    --bg-subnet: #f6f8fa;
    --bg-node: #ddf4ff;
    --bg-rt: #fbefff;
    --bg-eip: #fff8c5;
    --bg-test: #f6f8fa;
    --stroke-vpc: #656d76;
    --stroke-az: #d0d7de;
    --stroke-node: #0969da;
    --stroke-rt: #8250df;
    --stroke-eip: #9a6700;
    --stroke-test: #8b949e;
    --stroke-arr: #656d76;
    --text-primary: #1f2328;
    --text-secondary: #656d76;
    --text-node: #0550ae;
    --text-rt: #6639ba;
    --text-eip: #7d4e00;
    --text-note: #656d76;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-subnet: #161b22;
      --bg-node: #0c2d49;
      --bg-rt: #1c0f35;
      --bg-eip: #2a1f00;
      --bg-test: #161b22;
      --stroke-vpc: #8b949e;
      --stroke-az: #30363d;
      --stroke-node: #58a6ff;
      --stroke-rt: #bc8cff;
      --stroke-eip: #d29922;
      --stroke-test: #484f58;
      --stroke-arr: #8b949e;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-node: #79c0ff;
      --text-rt: #d2a8ff;
      --text-eip: #e3b341;
      --text-note: #8b949e;
    }
  }
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; }
  .t14b { font-size: 14px; font-weight: 600; }
  .t13b { font-size: 13px; font-weight: 600; }
  .t12  { font-size: 12px; font-weight: 400; }
  .t11  { font-size: 11px; font-weight: 400; }
  .t10  { font-size: 10px; font-weight: 400; }
</style>
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="var(--stroke-arr)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Internet + IGW -->
<text class="t12" x="340" y="14" text-anchor="middle" fill="var(--text-secondary)">Internet</text>
<g>
  <title>Internet gateway — routes public subnet traffic to/from the internet</title>
  <rect x="278" y="24" width="124" height="34" rx="6" fill="var(--bg-test)" stroke="var(--stroke-test)" stroke-width="0.75"/>
  <text class="t12" x="340" y="45" text-anchor="middle" fill="var(--text-primary)" dominant-baseline="central">Internet gateway</text>
</g>
<line x1="340" y1="58" x2="340" y2="74" stroke="var(--stroke-arr)" stroke-width="1" marker-end="url(#ah)"/>

<!-- VPC -->
<rect x="15" y="76" width="650" height="378" rx="12" fill="none" stroke="var(--stroke-vpc)" stroke-width="1.25" stroke-dasharray="6 3"/>
<text class="t14b" x="340" y="95" text-anchor="middle" fill="var(--text-primary)">VPC 10.0.0.0/16</text>

<!-- AZ boundaries -->
<rect x="24" y="106" width="316" height="340" rx="8" fill="none" stroke="var(--stroke-az)" stroke-width="0.75" stroke-dasharray="4 3"/>
<text class="t11" x="182" y="120" text-anchor="middle" fill="var(--text-secondary)">AZ-a</text>

<rect x="350" y="106" width="308" height="340" rx="8" fill="none" stroke="var(--stroke-az)" stroke-width="0.75" stroke-dasharray="4 3"/>
<text class="t11" x="504" y="120" text-anchor="middle" fill="var(--text-secondary)">AZ-b</text>

<!-- Public subnet A -->
<rect x="36" y="128" width="292" height="96" rx="8" fill="var(--bg-subnet)" stroke="var(--stroke-az)" stroke-width="0.75"/>
<text class="t11" x="182" y="143" text-anchor="middle" fill="var(--text-secondary)">Public 10.0.1.0/24</text>

<!-- ZeroNAT-a -->
<g>
  <title>ZeroNAT-a — single-mode instance in AZ-a. Boots with TAKEOVER_ON_BOOT=true, creates 0.0.0.0/0 route on RT-a. No HA — if this instance fails, AZ-a loses NAT.</title>
  <rect x="98" y="154" width="168" height="42" rx="6" fill="var(--bg-node)" stroke="var(--stroke-node)" stroke-width="1"/>
  <text class="t13b" x="182" y="169" text-anchor="middle" fill="var(--text-node)" dominant-baseline="central">ZeroNAT-a</text>
  <text class="t10" x="182" y="185" text-anchor="middle" fill="var(--text-node)" dominant-baseline="central">single mode</text>
</g>

<!-- EIP-a -->
<g>
  <title>Elastic IP for ZeroNAT-a — consistent public egress address for AZ-a traffic.</title>
  <rect x="60" y="160" width="32" height="18" rx="9" fill="var(--bg-eip)" stroke="var(--stroke-eip)" stroke-width="0.75"/>
  <text class="t10" x="76" y="169" text-anchor="middle" fill="var(--text-eip)" dominant-baseline="central">EIP</text>
</g>
<line x1="92" y1="169" x2="98" y2="172" stroke="var(--stroke-eip)" stroke-width="0.5" stroke-dasharray="2 2"/>

<!-- Public subnet B -->
<rect x="362" y="128" width="284" height="96" rx="8" fill="var(--bg-subnet)" stroke="var(--stroke-az)" stroke-width="0.75"/>
<text class="t11" x="504" y="143" text-anchor="middle" fill="var(--text-secondary)">Public 10.0.2.0/24</text>

<!-- ZeroNAT-b -->
<g>
  <title>ZeroNAT-b — single-mode instance in AZ-b. Boots with TAKEOVER_ON_BOOT=true, creates 0.0.0.0/0 route on RT-b. No HA — if this instance fails, AZ-b loses NAT.</title>
  <rect x="420" y="154" width="168" height="42" rx="6" fill="var(--bg-node)" stroke="var(--stroke-node)" stroke-width="1"/>
  <text class="t13b" x="504" y="169" text-anchor="middle" fill="var(--text-node)" dominant-baseline="central">ZeroNAT-b</text>
  <text class="t10" x="504" y="185" text-anchor="middle" fill="var(--text-node)" dominant-baseline="central">single mode</text>
</g>

<!-- EIP-b -->
<g>
  <title>Elastic IP for ZeroNAT-b — consistent public egress address for AZ-b traffic.</title>
  <rect x="382" y="160" width="32" height="18" rx="9" fill="var(--bg-eip)" stroke="var(--stroke-eip)" stroke-width="0.75"/>
  <text class="t10" x="398" y="169" text-anchor="middle" fill="var(--text-eip)" dominant-baseline="central">EIP</text>
</g>
<line x1="414" y1="169" x2="420" y2="172" stroke="var(--stroke-eip)" stroke-width="0.5" stroke-dasharray="2 2"/>

<!-- Route arrows -->
<line x1="182" y1="256" x2="182" y2="224" stroke="var(--stroke-arr)" stroke-width="1" marker-end="url(#ah)"/>
<text class="t10" x="182" y="246" text-anchor="middle" fill="var(--text-secondary)">0.0.0.0/0</text>

<line x1="504" y1="256" x2="504" y2="224" stroke="var(--stroke-arr)" stroke-width="1" marker-end="url(#ah)"/>
<text class="t10" x="504" y="246" text-anchor="middle" fill="var(--text-secondary)">0.0.0.0/0</text>

<!-- Private subnet A -->
<rect x="36" y="262" width="292" height="140" rx="8" fill="var(--bg-subnet)" stroke="var(--stroke-az)" stroke-width="0.75"/>
<text class="t11" x="182" y="278" text-anchor="middle" fill="var(--text-secondary)">Private 10.0.10.0/24</text>

<!-- RT-a -->
<g>
  <title>RT-a — private route table for AZ-a. Tagged with zeronat:group = single-az-a. Agent creates 0.0.0.0/0 route pointing to ZeroNAT-a's ENI at boot.</title>
  <rect x="56" y="290" width="252" height="24" rx="6" fill="var(--bg-rt)" stroke="var(--stroke-rt)" stroke-width="0.75"/>
  <text class="t11" x="182" y="302" text-anchor="middle" fill="var(--text-rt)" dominant-baseline="central">RT-a · zeronat:group = single-az-a</text>
</g>

<!-- Test A -->
<g>
  <title>Test instance in AZ-a — t4g.nano in private subnet, uses ZeroNAT-a for outbound internet access</title>
  <rect x="108" y="330" width="148" height="40" rx="6" fill="var(--bg-test)" stroke="var(--stroke-test)" stroke-width="0.75"/>
  <text class="t12" x="182" y="350" text-anchor="middle" fill="var(--text-primary)" dominant-baseline="central">Test instance</text>
</g>

<!-- Private subnet B -->
<rect x="362" y="262" width="284" height="140" rx="8" fill="var(--bg-subnet)" stroke="var(--stroke-az)" stroke-width="0.75"/>
<text class="t11" x="504" y="278" text-anchor="middle" fill="var(--text-secondary)">Private 10.0.20.0/24</text>

<!-- RT-b -->
<g>
  <title>RT-b — private route table for AZ-b. Tagged with zeronat:group = single-az-b. Agent creates 0.0.0.0/0 route pointing to ZeroNAT-b's ENI at boot.</title>
  <rect x="374" y="290" width="260" height="24" rx="6" fill="var(--bg-rt)" stroke="var(--stroke-rt)" stroke-width="0.75"/>
  <text class="t11" x="504" y="302" text-anchor="middle" fill="var(--text-rt)" dominant-baseline="central">RT-b · zeronat:group = single-az-b</text>
</g>

<!-- Test B -->
<g>
  <title>Test instance in AZ-b — t4g.nano in private subnet, uses ZeroNAT-b for outbound internet access</title>
  <rect x="430" y="330" width="148" height="40" rx="6" fill="var(--bg-test)" stroke="var(--stroke-test)" stroke-width="0.75"/>
  <text class="t12" x="504" y="350" text-anchor="middle" fill="var(--text-primary)" dominant-baseline="central">Test instance</text>
</g>

<!-- IGW connections -->
<line x1="182" y1="128" x2="310" y2="76" stroke="var(--stroke-az)" stroke-width="0.5" opacity="0.4"/>
<line x1="504" y1="128" x2="370" y2="76" stroke="var(--stroke-az)" stroke-width="0.5" opacity="0.4"/>

<!-- Notes -->
<text class="t11" x="340" y="430" text-anchor="middle" fill="var(--text-note)">Two independent single-mode instances — no HA, no heartbeat</text>
<text class="t11" x="340" y="446" text-anchor="middle" fill="var(--text-note)">Cost-optimized: AZ-local NAT without cross-AZ data transfer</text>
<text class="t11" x="340" y="462" text-anchor="middle" fill="var(--text-note)">If an instance fails, that AZ loses NAT until replaced</text>

</svg>