<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ZeroNAT cluster basic architecture diagram">
<style>
  :root {
    --bg-subnet: #f6f8fa;
    --bg-cluster: #ddf4ff;
    --bg-node: #ddf4ff;
    --bg-rt: #fbefff;
    --bg-eip: #fff8c5;
    --bg-test: #f6f8fa;
    --stroke-vpc: #656d76;
    --stroke-az: #d0d7de;
    --stroke-cluster: #0969da;
    --stroke-node: #0969da;
    --stroke-rt: #8250df;
    --stroke-eip: #9a6700;
    --stroke-test: #8b949e;
    --stroke-arr: #656d76;
    --stroke-hb: #0969da;
    --text-primary: #1f2328;
    --text-secondary: #656d76;
    --text-node: #0550ae;
    --text-rt: #6639ba;
    --text-eip: #7d4e00;
    --text-note: #656d76;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-subnet: #161b22;
      --bg-cluster: #0c2d49;
      --bg-node: #0c2d49;
      --bg-rt: #1c0f35;
      --bg-eip: #2a1f00;
      --bg-test: #161b22;
      --stroke-vpc: #8b949e;
      --stroke-az: #30363d;
      --stroke-cluster: #58a6ff;
      --stroke-node: #58a6ff;
      --stroke-rt: #bc8cff;
      --stroke-eip: #d29922;
      --stroke-test: #484f58;
      --stroke-arr: #8b949e;
      --stroke-hb: #58a6ff;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-node: #79c0ff;
      --text-rt: #d2a8ff;
      --text-eip: #e3b341;
      --text-note: #8b949e;
    }
  }
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; }
  .t14b { font-size: 14px; font-weight: 600; }
  .t13b { font-size: 13px; font-weight: 600; }
  .t12  { font-size: 12px; font-weight: 400; }
  .t11  { font-size: 11px; font-weight: 400; }
</style>
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="var(--stroke-arr)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<text class="t12" x="340" y="14" text-anchor="middle" fill="var(--text-secondary)">Internet</text>

<g>
  <title>Internet gateway — routes public subnet traffic to/from the internet</title>
  <rect x="278" y="24" width="124" height="34" rx="6" fill="var(--bg-test)" stroke="var(--stroke-test)" stroke-width="0.75"/>
  <text class="t12" x="340" y="45" text-anchor="middle" fill="var(--text-primary)" dominant-baseline="central">Internet gateway</text>
</g>

<line x1="340" y1="58" x2="340" y2="74" stroke="var(--stroke-arr)" stroke-width="1" marker-end="url(#ah)"/>

<rect x="15" y="76" width="650" height="424" rx="12" fill="none" stroke="var(--stroke-vpc)" stroke-width="1.25" stroke-dasharray="6 3"/>
<text class="t14b" x="340" y="95" text-anchor="middle" fill="var(--text-primary)">VPC 10.0.0.0/16</text>

<rect x="28" y="106" width="302" height="386" rx="8" fill="none" stroke="var(--stroke-az)" stroke-width="0.75" stroke-dasharray="4 3"/>
<text class="t11" x="179" y="120" text-anchor="middle" fill="var(--text-secondary)">AZ-a</text>

<rect x="350" y="106" width="302" height="386" rx="8" fill="none" stroke="var(--stroke-az)" stroke-width="0.75" stroke-dasharray="4 3"/>
<text class="t11" x="501" y="120" text-anchor="middle" fill="var(--text-secondary)">AZ-b</text>

<rect x="40" y="128" width="600" height="116" rx="8" fill="var(--bg-subnet)" stroke="var(--stroke-az)" stroke-width="0.75"/>
<text class="t11" x="340" y="143" text-anchor="middle" fill="var(--text-secondary)">Public subnets — 10.0.1.0/24 (AZ-a) + 10.0.2.0/24 (AZ-b)</text>

<g>
  <title>ZeroNAT HA cluster — two NAT instances with TCP 7946 heartbeat and conntrack state sync for zero-drop failover</title>
  <rect x="56" y="150" width="568" height="82" rx="8" fill="var(--bg-cluster)" stroke="var(--stroke-cluster)" stroke-width="0.75" stroke-dasharray="5 3"/>
  <text class="t12" x="340" y="166" text-anchor="middle" fill="var(--text-node)">ZeroNAT cluster "cluster-basic" — TCP 7946 heartbeat — conntrack sync</text>
</g>

<g>
  <title>ZeroNAT-a — active node. Boots with TAKEOVER_ON_BOOT=true, creates 0.0.0.0/0 routes on tagged route tables once nftables and health checks are ready. EIP is initially associated here.</title>
  <rect x="82" y="176" width="194" height="46" rx="6" fill="var(--bg-node)" stroke="var(--stroke-node)" stroke-width="1"/>
  <text class="t13b" x="179" y="193" text-anchor="middle" fill="var(--text-node)" dominant-baseline="central">ZeroNAT-a</text>
  <text class="t11" x="179" y="210" text-anchor="middle" fill="var(--text-node)" dominant-baseline="central">active · takeover on boot</text>
</g>

<g>
  <title>ZeroNAT-b — standby node. No TAKEOVER_ON_BOOT to avoid race condition. Takes over routes and EIP only if ZeroNAT-a becomes unhealthy via the failover path.</title>
  <rect x="404" y="176" width="194" height="46" rx="6" fill="var(--bg-node)" stroke="var(--stroke-node)" stroke-width="1"/>
  <text class="t13b" x="501" y="193" text-anchor="middle" fill="var(--text-node)" dominant-baseline="central">ZeroNAT-b</text>
  <text class="t11" x="501" y="210" text-anchor="middle" fill="var(--text-node)" dominant-baseline="central">standby</text>
</g>

<g>
  <title>Elastic IP — consistent public egress address. Initially on ZeroNAT-a. Agent calls AssociateAddress to migrate during failover.</title>
  <rect x="296" y="177" width="88" height="22" rx="11" fill="var(--bg-eip)" stroke="var(--stroke-eip)" stroke-width="0.75"/>
  <text class="t11" x="340" y="188" text-anchor="middle" fill="var(--text-eip)" dominant-baseline="central">Elastic IP</text>
</g>

<line x1="296" y1="188" x2="276" y2="196" stroke="var(--stroke-eip)" stroke-width="0.5" stroke-dasharray="2 2"/>

<text class="t11" x="340" y="260" text-anchor="middle" fill="var(--text-secondary)">0.0.0.0/0 → active node ENI</text>

<path d="M179 290 L179 270 L336 248" fill="none" stroke="var(--stroke-arr)" stroke-width="1" marker-end="url(#ah)"/>
<path d="M501 290 L501 270 L344 248" fill="none" stroke="var(--stroke-arr)" stroke-width="1" marker-end="url(#ah)"/>

<rect x="40" y="292" width="278" height="140" rx="8" fill="var(--bg-subnet)" stroke="var(--stroke-az)" stroke-width="0.75"/>
<text class="t11" x="179" y="308" text-anchor="middle" fill="var(--text-secondary)">Private 10.0.10.0/24</text>

<rect x="362" y="292" width="278" height="140" rx="8" fill="var(--bg-subnet)" stroke="var(--stroke-az)" stroke-width="0.75"/>
<text class="t11" x="501" y="308" text-anchor="middle" fill="var(--text-secondary)">Private 10.0.20.0/24</text>

<g>
  <title>RT-a — private route table for AZ-a. Tagged with zeronat:group and zeronat:group:active. Agent creates/replaces the 0.0.0.0/0 route pointing to the active node's ENI.</title>
  <rect x="68" y="320" width="222" height="24" rx="6" fill="var(--bg-rt)" stroke="var(--stroke-rt)" stroke-width="0.75"/>
  <text class="t11" x="179" y="332" text-anchor="middle" fill="var(--text-rt)" dominant-baseline="central">RT-a · zeronat:group tagged</text>
</g>

<g>
  <title>RT-b — private route table for AZ-b. Tagged with zeronat:group and zeronat:group:active. Agent creates/replaces the 0.0.0.0/0 route pointing to the active node's ENI.</title>
  <rect x="390" y="320" width="222" height="24" rx="6" fill="var(--bg-rt)" stroke="var(--stroke-rt)" stroke-width="0.75"/>
  <text class="t11" x="501" y="332" text-anchor="middle" fill="var(--text-rt)" dominant-baseline="central">RT-b · zeronat:group tagged</text>
</g>

<g>
  <title>Test instance in AZ-a — t4g.nano in private subnet, uses ZeroNAT for outbound internet access via the 0.0.0.0/0 route</title>
  <rect x="92" y="362" width="174" height="40" rx="6" fill="var(--bg-test)" stroke="var(--stroke-test)" stroke-width="0.75"/>
  <text class="t12" x="179" y="382" text-anchor="middle" fill="var(--text-primary)" dominant-baseline="central">Test instance</text>
</g>

<g>
  <title>Test instance in AZ-b — t4g.nano in private subnet, uses ZeroNAT for outbound internet access via the 0.0.0.0/0 route</title>
  <rect x="414" y="362" width="174" height="40" rx="6" fill="var(--bg-test)" stroke="var(--stroke-test)" stroke-width="0.75"/>
  <text class="t12" x="501" y="382" text-anchor="middle" fill="var(--text-primary)" dominant-baseline="central">Test instance</text>
</g>

<line x1="179" y1="128" x2="310" y2="76" stroke="var(--stroke-az)" stroke-width="0.5" opacity="0.4"/>
<line x1="501" y1="128" x2="370" y2="76" stroke="var(--stroke-az)" stroke-width="0.5" opacity="0.4"/>

<text class="t11" x="340" y="460" text-anchor="middle" fill="var(--text-note)">Both route tables point to the same active node's ENI</text>
<text class="t11" x="340" y="476" text-anchor="middle" fill="var(--text-note)">On failover: agent re-points both RTs + migrates EIP to surviving node</text>

</svg>