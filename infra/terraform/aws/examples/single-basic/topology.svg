<svg width="680" height="460" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ZeroNAT single basic architecture diagram">
<style>
  :root {
    --bg-subnet: #f6f8fa;
    --bg-node: #ddf4ff;
    --bg-rt: #fbefff;
    --bg-eip: #fff8c5;
    --bg-test: #f6f8fa;
    --stroke-vpc: #656d76;
    --stroke-az: #d0d7de;
    --stroke-node: #0969da;
    --stroke-rt: #8250df;
    --stroke-eip: #9a6700;
    --stroke-test: #8b949e;
    --stroke-arr: #656d76;
    --text-primary: #1f2328;
    --text-secondary: #656d76;
    --text-node: #0550ae;
    --text-rt: #6639ba;
    --text-eip: #7d4e00;
    --text-note: #656d76;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-subnet: #161b22;
      --bg-node: #0c2d49;
      --bg-rt: #1c0f35;
      --bg-eip: #2a1f00;
      --bg-test: #161b22;
      --stroke-vpc: #8b949e;
      --stroke-az: #30363d;
      --stroke-node: #58a6ff;
      --stroke-rt: #bc8cff;
      --stroke-eip: #d29922;
      --stroke-test: #484f58;
      --stroke-arr: #8b949e;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-node: #79c0ff;
      --text-rt: #d2a8ff;
      --text-eip: #e3b341;
      --text-note: #8b949e;
    }
  }
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; }
  .t14b { font-size: 14px; font-weight: 600; }
  .t13b { font-size: 13px; font-weight: 600; }
  .t12  { font-size: 12px; font-weight: 400; }
  .t11  { font-size: 11px; font-weight: 400; }
  .t10  { font-size: 10px; font-weight: 400; }
</style>
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="var(--stroke-arr)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Internet + IGW -->
<text class="t12" x="340" y="14" text-anchor="middle" fill="var(--text-secondary)">Internet</text>
<g>
  <title>Internet gateway — routes public subnet traffic to/from the internet</title>
  <rect x="278" y="24" width="124" height="34" rx="6" fill="var(--bg-test)" stroke="var(--stroke-test)" stroke-width="0.75"/>
  <text class="t12" x="340" y="45" text-anchor="middle" fill="var(--text-primary)" dominant-baseline="central">Internet gateway</text>
</g>
<line x1="340" y1="58" x2="340" y2="74" stroke="var(--stroke-arr)" stroke-width="1" marker-end="url(#ah)"/>

<!-- VPC -->
<rect x="15" y="76" width="650" height="358" rx="12" fill="none" stroke="var(--stroke-vpc)" stroke-width="1.25" stroke-dasharray="6 3"/>
<text class="t14b" x="340" y="95" text-anchor="middle" fill="var(--text-primary)">VPC 10.0.0.0/16</text>

<!-- Public subnet — single, left-aligned -->
<rect x="36" y="108" width="280" height="96" rx="8" fill="var(--bg-subnet)" stroke="var(--stroke-az)" stroke-width="0.75"/>
<text class="t11" x="176" y="123" text-anchor="middle" fill="var(--text-secondary)">Public 10.0.1.0/24 (AZ-a)</text>

<!-- ZeroNAT -->
<g>
  <title>ZeroNAT — single-mode instance. Boots with TAKEOVER_ON_BOOT=true, creates 0.0.0.0/0 route on the shared private route table. No HA — simplest possible setup.</title>
  <rect x="92" y="136" width="168" height="42" rx="6" fill="var(--bg-node)" stroke="var(--stroke-node)" stroke-width="1"/>
  <text class="t13b" x="176" y="151" text-anchor="middle" fill="var(--text-node)" dominant-baseline="central">ZeroNAT</text>
  <text class="t10" x="176" y="167" text-anchor="middle" fill="var(--text-node)" dominant-baseline="central">single mode</text>
</g>

<!-- EIP -->
<g>
  <title>Elastic IP — consistent public egress address for all private subnet traffic.</title>
  <rect x="54" y="142" width="32" height="18" rx="9" fill="var(--bg-eip)" stroke="var(--stroke-eip)" stroke-width="0.75"/>
  <text class="t10" x="70" y="151" text-anchor="middle" fill="var(--text-eip)" dominant-baseline="central">EIP</text>
</g>
<line x1="86" y1="151" x2="92" y2="154" stroke="var(--stroke-eip)" stroke-width="0.5" stroke-dasharray="2 2"/>

<!-- IGW connection -->
<line x1="176" y1="108" x2="310" y2="76" stroke="var(--stroke-az)" stroke-width="0.5" opacity="0.4"/>

<!-- Route arrow — converging from both private subnets to ZeroNAT -->
<text class="t10" x="340" y="228" text-anchor="middle" fill="var(--text-secondary)">0.0.0.0/0 → ZeroNAT ENI</text>

<path d="M176 246 L176 218 L176 204" fill="none" stroke="var(--stroke-arr)" stroke-width="1" marker-end="url(#ah)"/>
<path d="M490 246 L490 226 L180 218 L178 204" fill="none" stroke="var(--stroke-arr)" stroke-width="1" marker-end="url(#ah)"/>

<!-- Private subnet A -->
<rect x="36" y="250" width="280" height="140" rx="8" fill="var(--bg-subnet)" stroke="var(--stroke-az)" stroke-width="0.75"/>
<text class="t11" x="176" y="266" text-anchor="middle" fill="var(--text-secondary)">Private 10.0.10.0/24 (AZ-a)</text>

<!-- Private subnet B -->
<rect x="350" y="250" width="296" height="140" rx="8" fill="var(--bg-subnet)" stroke="var(--stroke-az)" stroke-width="0.75"/>
<text class="t11" x="498" y="266" text-anchor="middle" fill="var(--text-secondary)">Private 10.0.20.0/24 (AZ-b)</text>

<!-- Shared RT — spans both subnets -->
<g>
  <title>Shared private route table — used by both private subnets. Tagged with zeronat:group = single-basic. Agent creates 0.0.0.0/0 route pointing to ZeroNAT's ENI at boot.</title>
  <rect x="56" y="278" width="570" height="24" rx="6" fill="var(--bg-rt)" stroke="var(--stroke-rt)" stroke-width="0.75"/>
  <text class="t11" x="341" y="290" text-anchor="middle" fill="var(--text-rt)" dominant-baseline="central">Shared RT · zeronat:group = single-basic · associated to both private subnets</text>
</g>

<!-- Test A -->
<g>
  <title>Test instance in AZ-a — t4g.nano in private subnet, uses ZeroNAT for outbound internet access</title>
  <rect x="102" y="318" width="148" height="40" rx="6" fill="var(--bg-test)" stroke="var(--stroke-test)" stroke-width="0.75"/>
  <text class="t12" x="176" y="338" text-anchor="middle" fill="var(--text-primary)" dominant-baseline="central">Test instance</text>
</g>

<!-- Test B -->
<g>
  <title>Test instance in AZ-b — t4g.nano in private subnet, uses ZeroNAT for outbound internet access (cross-AZ traffic to ZeroNAT in AZ-a)</title>
  <rect x="424" y="318" width="148" height="40" rx="6" fill="var(--bg-test)" stroke="var(--stroke-test)" stroke-width="0.75"/>
  <text class="t12" x="498" y="338" text-anchor="middle" fill="var(--text-primary)" dominant-baseline="central">Test instance</text>
</g>

<!-- Notes -->
<text class="t11" x="340" y="416" text-anchor="middle" fill="var(--text-note)">Simplest setup — one instance, one shared route table, no HA</text>
<text class="t11" x="340" y="432" text-anchor="middle" fill="var(--text-note)">Both private subnets route through the same ZeroNAT ENI</text>
<text class="t11" x="340" y="448" text-anchor="middle" fill="var(--text-note)">AZ-b traffic crosses AZs to reach ZeroNAT in AZ-a</text>

</svg>