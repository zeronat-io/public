AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  ZeroNAT — HA cluster with two NAT nodes across AZs. Creates a complete VPC
  with two ZeroNAT instances (active/standby), two private subnets with
  per-AZ route tables, and test instances for verification. Sub-second failover.

# =============================================================================
# Parameters
# =============================================================================

Parameters:
  ZeroNATAmiId:
    Type: AWS::EC2::Image::Id
    Description: AMI ID for ZeroNAT instances (pre-baked with the agent).

  TestAmiId:
    Type: AWS::EC2::Image::Id
    Description: AMI ID for test instances (e.g. Amazon Linux 2023 ARM64).

  InstanceType:
    Type: String
    Default: t4g.micro
    Description: EC2 instance type for both ZeroNAT nodes.
    AllowedValues:
      - t4g.nano
      - t4g.micro
      - t4g.small
      - t4g.medium
      - t4g.large

  KeyName:
    Type: String
    Default: ""
    Description: >-
      SSH key pair name. Leave empty to disable SSH access.


# =============================================================================
# Conditions
# =============================================================================

Conditions:
  HasKeyName: !Not [!Equals [!Ref KeyName, ""]]


# =============================================================================
# Resources
# =============================================================================

Resources:

  # ---------------------------------------------------------------------------
  # VPC + Internet Gateway
  # ---------------------------------------------------------------------------

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-vpc"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-igw"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ---------------------------------------------------------------------------
  # Subnets
  # ---------------------------------------------------------------------------

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-a"

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public-b"

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-a"

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.20.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-b"

  # ---------------------------------------------------------------------------
  # Route Tables
  # ---------------------------------------------------------------------------

  # Public route table: 0.0.0.0/0 → IGW (shared by both public subnets)
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-public"

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetAAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # Private route tables: one per AZ. 0.0.0.0/0 routes are created by the
  # ZeroNAT agent at boot. On failover, all routes are re-pointed to the
  # surviving node's ENI.
  PrivateRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-a"
        - Key: "zeronat:group"
          Value: !Ref AWS::StackName
        - Key: "zeronat:group:active"
          Value: "true"

  PrivateRouteTableB:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-private-b"
        - Key: "zeronat:group"
          Value: !Ref AWS::StackName
        - Key: "zeronat:group:active"
          Value: "true"

  PrivateSubnetAAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTableA

  PrivateSubnetBAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTableB

  # ---------------------------------------------------------------------------
  # Elastic IP
  # ---------------------------------------------------------------------------

  NATElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-nat-eip"

  NATEIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt NATElasticIP.AllocationId
      NetworkInterfaceId: !GetAtt ZeroNATInstanceA.PrimaryNetworkInterfaceId

  # ---------------------------------------------------------------------------
  # IAM Role + Instance Profile
  # ---------------------------------------------------------------------------

  ZeroNATRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-zeronat"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${AWS::StackName}-zeronat"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: DescribeForDiscovery
                Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeRouteTables
                Resource: "*"
              - Sid: RouteTableMutationA
                Effect: Allow
                Action:
                  - ec2:ReplaceRoute
                  - ec2:CreateRoute
                Resource: !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:route-table/${PrivateRouteTableA}"
              - Sid: RouteTableMutationB
                Effect: Allow
                Action:
                  - ec2:ReplaceRoute
                  - ec2:CreateRoute
                Resource: !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:route-table/${PrivateRouteTableB}"
              - Sid: EIPFailover
                Effect: Allow
                Action:
                  - ec2:AssociateAddress
                  - ec2:DisassociateAddress
                  - ec2:DescribeAddresses
                Resource: "*"
              - Sid: CloudWatchMetrics
                Effect: Allow
                Action:
                  - cloudwatch:GetMetricData
                Resource: "*"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-zeronat"

  ZeroNATInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${AWS::StackName}-zeronat"
      Roles:
        - !Ref ZeroNATRole

  # ---------------------------------------------------------------------------
  # ZeroNAT Security Group
  # ---------------------------------------------------------------------------

  ZeroNATSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ZeroNAT NAT instance security group
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      SecurityGroupIngress:
        - IpProtocol: "-1"
          CidrIp: 10.0.0.0/16
          Description: NAT traffic from VPC
        - IpProtocol: tcp
          FromPort: 9100
          ToPort: 9100
          CidrIp: 10.0.0.0/16
          Description: Prometheus metrics (TCP 9100)
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 10.0.0.0/16
          Description: Web UI (TCP 8080)
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-zeronat"

  # Peer control plane — self-referencing rule for heartbeat between nodes.
  ZeroNATPeerControlIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ZeroNATSecurityGroup
      IpProtocol: tcp
      FromPort: 7946
      ToPort: 7946
      SourceSecurityGroupId: !Ref ZeroNATSecurityGroup
      Description: Peer control plane (TCP 7946)

  ZeroNATSSHIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasKeyName
    Properties:
      GroupId: !Ref ZeroNATSecurityGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: 10.0.0.0/16
      Description: SSH (TCP 22)

  # ---------------------------------------------------------------------------
  # ZeroNAT Instances
  # ---------------------------------------------------------------------------

  # Instance A — initial active node. Boots with TAKEOVER_ON_BOOT=true to
  # create/replace 0.0.0.0/0 routes once the agent is fully initialized.
  ZeroNATInstanceA:
    Type: AWS::EC2::Instance
    DependsOn: VPCGatewayAttachment
    Properties:
      ImageId: !Ref ZeroNATAmiId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PublicSubnetA
      SourceDestCheck: false
      IamInstanceProfile: !Ref ZeroNATInstanceProfile
      SecurityGroupIds:
        - !Ref ZeroNATSecurityGroup
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
      UserData:
        Fn::Base64: !Sub |
          # ZeroNAT agent configuration — instance A (active)
          ZERONAT_HA_ENABLED=true
          ZERONAT_TAKEOVER_ON_BOOT=true
          ZERONAT_WEB_ADDR=0.0.0.0:8080
          ZERONAT_EIP_ALLOCATION_ID=${NATElasticIP.AllocationId}
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-a"
        - Key: "zeronat:group"
          Value: !Ref AWS::StackName

  # Instance B — standby node. NO TAKEOVER_ON_BOOT to avoid a race condition
  # when both nodes start simultaneously during initial deployment. Takes over
  # routes only via the normal failover path if instance A becomes unhealthy.
  ZeroNATInstanceB:
    Type: AWS::EC2::Instance
    DependsOn: VPCGatewayAttachment
    Properties:
      ImageId: !Ref ZeroNATAmiId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PublicSubnetB
      SourceDestCheck: false
      IamInstanceProfile: !Ref ZeroNATInstanceProfile
      SecurityGroupIds:
        - !Ref ZeroNATSecurityGroup
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
      UserData:
        Fn::Base64: !Sub |
          # ZeroNAT agent configuration — instance B (standby)
          ZERONAT_HA_ENABLED=true
          ZERONAT_WEB_ADDR=0.0.0.0:8080
          ZERONAT_EIP_ALLOCATION_ID=${NATElasticIP.AllocationId}
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-b"
        - Key: "zeronat:group"
          Value: !Ref AWS::StackName

  # ---------------------------------------------------------------------------
  # Test Instances
  # ---------------------------------------------------------------------------

  TestSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Test instances - egress all, SSH from VPC
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-test"

  TestSSHIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasKeyName
    Properties:
      GroupId: !Ref TestSecurityGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: 10.0.0.0/16
      Description: SSH (TCP 22)

  TestInstanceA:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref TestAmiId
      InstanceType: t4g.nano
      SubnetId: !Ref PrivateSubnetA
      SecurityGroupIds:
        - !Ref TestSecurityGroup
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-test-a"

  TestInstanceB:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref TestAmiId
      InstanceType: t4g.nano
      SubnetId: !Ref PrivateSubnetB
      SecurityGroupIds:
        - !Ref TestSecurityGroup
      KeyName: !If [HasKeyName, !Ref KeyName, !Ref "AWS::NoValue"]
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-test-b"


# =============================================================================
# Outputs
# =============================================================================

Outputs:
  VpcId:
    Description: VPC ID
    Value: !Ref VPC

  ZeroNATInstanceAId:
    Description: ZeroNAT instance A (active) ID
    Value: !Ref ZeroNATInstanceA

  ZeroNATInstanceBId:
    Description: ZeroNAT instance B (standby) ID
    Value: !Ref ZeroNATInstanceB

  ZeroNATInstanceAPrivateIp:
    Description: ZeroNAT instance A private IP
    Value: !GetAtt ZeroNATInstanceA.PrivateIp

  ZeroNATInstanceBPrivateIp:
    Description: ZeroNAT instance B private IP
    Value: !GetAtt ZeroNATInstanceB.PrivateIp

  EIPPublicIp:
    Description: Shared Elastic IP (public egress address, moves on failover)
    Value: !Ref NATElasticIP

  TestInstanceAPrivateIp:
    Description: Test instance A private IP
    Value: !GetAtt TestInstanceA.PrivateIp

  TestInstanceBPrivateIp:
    Description: Test instance B private IP
    Value: !GetAtt TestInstanceB.PrivateIp
