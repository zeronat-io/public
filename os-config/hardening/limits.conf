# ZeroNAT process resource limits.
# Installed to /etc/security/limits.d/zeronat.conf during AMI bake.
#
# The zeronat-agent.service unit also sets LimitNOFILE=65536 directly, which
# takes precedence for the agent process. This file provides a consistent
# baseline for any ZeroNAT-related process not covered by a systemd unit limit.

root       soft    nofile    65536
root       hard    nofile    65536
zeronat    soft    nofile    65536
zeronat    hard    nofile    65536
